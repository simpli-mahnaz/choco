<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTT Platform</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f1014;
    color:white;
}

/* NAVBAR */
.navbar{
    position:fixed;
    width:100%;
    top:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:#141b29;
    z-index:1000;
}

.logo{
    font-size:22px;
    font-weight:bold;
    color:#00a8e1;
}

.menu a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-size:14px;
}

.menu a:hover{
    color:#00a8e1;
}

/* HERO VIDEO */
.hero{
    margin-top:70px;
    position:relative;
    height:85vh;
    overflow:hidden;
}

.bg-video{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
}

.hero-content{
    position:absolute;
    bottom:80px;
    left:60px;
    max-width:500px;
}

.hero-content h1{
    font-size:50px;
    margin-bottom:15px;
}

.hero-content p{
    margin-bottom:20px;
    line-height:1.5;
}

.hero-content button{
    padding:12px 25px;
    background:#00a8e1;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:5px;
}

.hero-content button:hover{
    background:#008bbd;
}

/* SECTION */
.section{
    padding:30px 40px;
}

.section h2{
    margin-bottom:15px;
}

/* MOVIE ROW */
.movie-row{
    display:flex;
    gap:15px;
    overflow-x:auto;
    scrollbar-width:none;
}

.movie-row::-webkit-scrollbar{
    display:none;
}

.movie-card{
    min-width:180px;
    height:250px;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}

.movie-card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.movie-card:hover{
    transform:scale(1.1);
}

/* AUTO SLIDER */
.slider{
    position:relative;
    height:300px;
    overflow:hidden;
}

.slides{
    display:flex;
    width:300%;
    animation:slide 12s infinite;
}

.slides img{
    width:100%;
    height:300px;
    object-fit:cover;
}

@keyframes slide{
    0%{transform:translateX(0);}
    33%{transform:translateX(-100%);}
    66%{transform:translateX(-200%);}
    100%{transform:translateX(0);}
}

/* RESPONSIVE */
@media(max-width:768px){
    .hero-content h1{
        font-size:28px;
    }
    .hero-content{
        left:20px;
    }
    .navbar{
        padding:15px 20px;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">My OTT</div>
    <div class="menu">
        <a href="#">Home</a>
        <a href="#">TV</a>
        <a href="#">Movies</a>
        <a href="#">Sports</a>
        <a href="#">Premium</a>
    </div>
</div>

<!-- HERO VIDEO -->
<div class="hero">
    <video autoplay muted loop class="bg-video">
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video>
    <div class="hero-content">
        <h1>Unlimited Entertainment</h1>
        <p>Watch latest movies, shows and live sports anytime.</p>
        <button>Watch Now</button>
    </div>
</div>

<!-- AUTO IMAGE SLIDER -->
<div class="slider">
    <div class="slides">
        <img src="https://images.unsplash.com/photo-1606813909353-84b78f4db7f0">
        <img src="https://images.unsplash.com/photo-1524985069026-dd778a71c7b4">
        <img src="https://images.unsplash.com/photo-1497032205916-ac775f0649ae">
    </div>
</div>

<!-- TRENDING -->
<div class="section">
    <h2>Trending Now</h2>
    <div class="movie-row">
        <div class="movie-card"><img src="https://m.media-amazon.com/images/I/81p+xe8cbnL._AC_SY679_.jpg"></div>
        <div class="movie-card"><img src="https://m.media-amazon.com/images/I/91HHqVTAJQL._AC_SY679_.jpg"></div>
        <div class="movie-card"><img src="https://m.media-amazon.com/images/I/71niXI3lxlL._AC_SY679_.jpg"></div>
        <div class="movie-card"><img src="https://m.media-amazon.com/images/I/81ExhpBEbHL._AC_SY679_.jpg"></div>
        <div class="movie-card"><img src="https://m.media-amazon.com/images/I/81N8t3qz1fL._AC_SY679_.jpg"></div>
    </div>
</div>

<!-- POPULAR -->
<div class="section">
    <h2>Popular Movies</h2>
    <div class="movie-row">
        <div class="movie-card"><img src="https://m.media-amazon.com/images/I/81p+xe8cbnL._AC_SY679_.jpg"></div>
        <div class="movie-card"><img src="https://m.media-amazon.com/images/I/91HHqVTAJQL._AC_SY679_.jpg"></div>
        <div class="movie-card"><img src="https://m.media-amazon.com/images/I/71niXI3lxlL._AC_SY679_.jpg"></div>
        <div class="movie-card"><img src="https://m.media-amazon.com/images/I/81ExhpBEbHL._AC_SY679_.jpg"></div>
    </div>
</div>

</body>
</html>
